# /etc/nginx/sites-available/iot.tranbadat.vn.conf
# Bật site:
#   sudo ln -s /etc/nginx/sites-available/iot.tranbadat.vn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cấp SSL (sau khi DNS đã trỏ về server):
#   sudo certbot --nginx -d iot.tranbadat.vn
# certbot sẽ tự thêm block listen 443 + chứng chỉ và chuyển hướng 80 -> 443.

server {
    listen 80;
    listen [::]:80;
    server_name iot.tranbadat.vn;

    client_max_body_size 10M;

    location / {
        # Backend Spring Boot (Docker publish 8080 trên host).
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
